group {
    auto_group = true
    insert_after_current = true
    focus_removed_window = true
    drag_into_group = 1
    merge_groups_on_drag = true
    merge_groups_on_groupbar = true
    merge_floated_into_tiled_on_groupbar = false
    group_on_movetoworkspace = false
    col.border_active = $color_group_border_active
    col.border_inactive = $color_group_border_inactive
    col.border_locked_active = $color_group_border_locked_active
    col.border_locked_inactive = $color_group_border_locked_inactive

    groupbar {
        enabled = true
        font_family =
        font_size = 8
        font_weight_active = normal
        font_weight_inactive = normal
        gradients = false
        height = 14
        indicator_gap = 0
        indicator_height = 3
        stacked = false
        priority = 3
        render_titles = true
        text_offset = 0
        scrolling = true
        rounding = 1
        rounding_power = 2.0
        gradient_rounding = 2
        gradient_rounding_power = 2.0
        round_only_edges = true
        gradient_round_only_edges = true
        text_color = $color_group_text
        text_color_inactive = $color_group_text_inactive
        text_color_locked_active = $color_group_text_locked_active
        text_color_locked_inactive = $color_group_text_locked_inactive
        col.active = $color_groupbar_active
        col.inactive = $color_groupbar_inactive
        col.locked_active = $color_groupbar_locked_active
        col.locked_inactive = $color_groupbar_locked_inactive
        gaps_in = 2
        gaps_out = 2
        keep_upper_gap = true
        blur = false
    }
}
